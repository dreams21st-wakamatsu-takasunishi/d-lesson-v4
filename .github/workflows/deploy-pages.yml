name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_TABLE: ${{ vars.VITE_SUPABASE_TABLE || 'test_user_data' }}
      VITE_SUPABASE_USE_TEST_TABLE: ${{ vars.VITE_SUPABASE_USE_TEST_TABLE || 'true' }}
      VITE_ENABLE_LEGACY_SUPABASE_SYNC: 'false'
      VITE_ENABLE_RLS_CLOUD_SYNC: ${{ vars.VITE_ENABLE_RLS_CLOUD_SYNC || 'true' }}
      VITE_ENABLE_SETTINGS_TABLE: ${{ vars.VITE_ENABLE_SETTINGS_TABLE || 'false' }}
      VITE_REQUIRE_SUPABASE_AUTH: 'true'
      VITE_ALLOW_LEGACY_ADMIN_PASS: 'false'
      VITE_STUDENT_LOGIN_EMAIL_DOMAIN: ${{ vars.VITE_STUDENT_LOGIN_EMAIL_DOMAIN }}
      VITE_STUDENT_LOGIN_EMAIL_PREFIX: ${{ vars.VITE_STUDENT_LOGIN_EMAIL_PREFIX || 'dlesson-student-' }}
      VITE_STUDENT_LOGIN_CAMPUS_CODE: ${{ vars.VITE_STUDENT_LOGIN_CAMPUS_CODE }}
      VITE_STUDENT_LOGIN_CAMPUS_CODES: ${{ vars.VITE_STUDENT_LOGIN_CAMPUS_CODES }}
      VITE_STUDENT_LOGIN_STRICT_CAMPUS: ${{ vars.VITE_STUDENT_LOGIN_STRICT_CAMPUS || 'false' }}
      VITE_STUDENT_LOGIN_NUMBER_PAD: ${{ vars.VITE_STUDENT_LOGIN_NUMBER_PAD || '3' }}
      VITE_STUDENT_LOGIN_MIN: ${{ vars.VITE_STUDENT_LOGIN_MIN || '1' }}
      VITE_STUDENT_LOGIN_MAX: ${{ vars.VITE_STUDENT_LOGIN_MAX || '50' }}
      VITE_STUDENT_LOGIN_PASSCODE_MIN_LENGTH: ${{ vars.VITE_STUDENT_LOGIN_PASSCODE_MIN_LENGTH || '6' }}
      VITE_STUDENT_LOGIN_PASSCODE_MAX_LENGTH: ${{ vars.VITE_STUDENT_LOGIN_PASSCODE_MAX_LENGTH || '12' }}
      VITE_STUDENT_IDLE_LOGOUT_MINUTES: ${{ vars.VITE_STUDENT_IDLE_LOGOUT_MINUTES || '20' }}
      VITE_BUILD_COMMIT: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check public environment
        run: npm run check:public-env

      - name: Check inline handlers
        run: npm run check:inline-handlers

      - name: Check undefined names
        run: npm run check:undefined

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-public-url:
    needs: deploy
    runs-on: ubuntu-latest
    env:
      D_LESSON_PUBLIC_URL: ${{ needs.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check deployed public URL
        run: npm run check:public-production-url -- --expect-sha=${{ github.sha }} --retries=6 --retry-delay-ms=10000
